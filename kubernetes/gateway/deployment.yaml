apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          # Image tag is the services repo's commit SHA (ADR 0008/0009) —
          # bump this one line and open a PR to deploy a new build.
          image: ghcr.io/adamastorx/gateway:cc50af03777c8934fc36a08b1ffa20a4ca52a127
          ports:
            - name: http
              containerPort: 8080
          # Runtime address of the api Service, injected per ADR 0010
          # ("platform owns the runtime address") — matches the
          # application.yml default (api.base-url) but is set explicitly
          # here rather than relying on that default.
          env:
            - name: API_SERVICE_URL
              value: http://api.api.svc.cluster.local
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.otel.svc.cluster.local:4318/v1/traces
          # Spring Boot Actuator health groups (application.yml enables
          # management.endpoint.health.probes) — JVM cold start is slower
          # than whoami's, hence the longer initialDelaySeconds.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
