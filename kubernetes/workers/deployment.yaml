apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  labels:
    app: workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workers
  template:
    metadata:
      labels:
        app: workers
    spec:
      containers:
        - name: workers
          # Image tag is the services repo's commit SHA (ADR 0008/0009) —
          # bump this one line and open a PR to deploy a new build.
          image: ghcr.io/adamastorx/workers:e50d61fa69885f3625328dd2c4f543850216e695
          ports:
            # No Kubernetes Service for this port (ADR 0009/0011) —
            # workers has no business HTTP API, this exists solely so
            # actuator's health probes below have something to hit.
            - name: http
              containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.kafka.svc.cluster.local:9092
          # Spring Boot Actuator health groups (application.yml enables
          # management.endpoint.health.probes) — JVM cold start is slower
          # than whoami's, hence the longer initialDelaySeconds.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
