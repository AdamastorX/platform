# Bootstrap-CA pattern (cert-manager docs: configuration/selfsigned/
# #bootstrapping-ca-issuers): a self-signed issuer signs one long-lived
# root CA, and the `adamastorx-ca` ClusterIssuer signs everything else
# off that root. Why not Let's Encrypt: see README.md in this directory.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# The root CA certificate. Lives in the cert-manager namespace because a
# ClusterIssuer's `ca.secretName` is resolved there (the cluster resource
# namespace).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: adamastorx-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: AdamastorX Root CA
  secretName: adamastorx-root-ca
  duration: 87600h # 10 years; leaf certs get the cert-manager default 90d
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# The issuer everything else references (e.g. via the
# `cert-manager.io/cluster-issuer: adamastorx-ca` Ingress annotation).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: adamastorx-ca
spec:
  ca:
    secretName: adamastorx-root-ca
