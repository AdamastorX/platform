apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Image tag is the services repo's commit SHA (ADR 0008/0009) —
          # bump this one line and open a PR to deploy a new build.
          image: ghcr.io/adamastorx/api:cc50af03777c8934fc36a08b1ffa20a4ca52a127
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.kafka.svc.cluster.local:9092
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.otel.svc.cluster.local:4318/v1/traces
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresql.api.svc.cluster.local:5432/api
            # Username isn't a secret (just a Postgres role name) --
            # only the password lives in the chart-generated Secret
            # (services#4, ADR 0012).
            - name: SPRING_DATASOURCE_USERNAME
              value: api
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql
                  key: password
          # Spring Boot Actuator health groups (application.yml enables
          # management.endpoint.health.probes) — JVM cold start is slower
          # than whoami's, hence the longer initialDelaySeconds.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
