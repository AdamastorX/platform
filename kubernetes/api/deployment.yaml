apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Image tag is the services repo's commit SHA (ADR 0008/0009) —
          # bump this one line and open a PR to deploy a new build.
          image: ghcr.io/adamastorx/api:8337d50827be86437992303431ef23a58f0de663
          ports:
            - name: http
              containerPort: 8080
          # Spring Boot Actuator health groups (application.yml enables
          # management.endpoint.health.probes) — JVM cold start is slower
          # than whoami's, hence the longer initialDelaySeconds.
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
