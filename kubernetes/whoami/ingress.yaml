# Exposes whoami through Traefik with TLS from the project CA — the
# end-to-end proof for ingress + cert-manager (platform#3).
# No public DNS: resolve the host locally, e.g.
#   curl --resolve whoami.local.adamastorx.dev:443:127.0.0.1 \
#        --cacert adamastorx-ca.crt https://whoami.local.adamastorx.dev/
# (CA export: see ../cert-manager-issuers/README.md)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  labels:
    app: whoami
  annotations:
    # ingress-shim creates/renews the 'whoami-tls' Certificate for us.
    cert-manager.io/cluster-issuer: adamastorx-ca
spec:
  ingressClassName: traefik
  rules:
    - host: whoami.local.adamastorx.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  name: http
  tls:
    - hosts:
        - whoami.local.adamastorx.dev
      secretName: whoami-tls
