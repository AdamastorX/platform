# Root app-of-apps: the only Application applied manually (during bootstrap).
# It watches argocd/apps/ on main; every other app is a manifest added there via PR.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AdamastorX/platform
    targetRevision: feat/argocd-bootstrap
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
