name: ci

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  KUBECONFORM_VERSION: v0.8.0
  SHELLCHECK_VERSION: v0.11.0

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install kubeconform ${{ env.KUBECONFORM_VERSION }}
        run: |
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin kubeconform

      - name: kubeconform
        run: >
          kubeconform -strict -summary
          -kubernetes-version 1.36.2
          -schema-location default
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          argocd/ bootstrap/root-app.yaml kubernetes/

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install shellcheck ${{ env.SHELLCHECK_VERSION }}
        run: |
          curl -sSL "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar xJ --strip-components=1 -C /usr/local/bin "shellcheck-${SHELLCHECK_VERSION}/shellcheck"

      - name: shellcheck
        run: git ls-files '*.sh' | xargs -r shellcheck

  ci:
    needs: [terraform, manifests, shell]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.terraform.result }}" != "success" ] \
            || [ "${{ needs.manifests.result }}" != "success" ] \
            || [ "${{ needs.shell.result }}" != "success" ]; then
            echo "One or more jobs failed:"
            echo "  terraform: ${{ needs.terraform.result }}"
            echo "  manifests: ${{ needs.manifests.result }}"
            echo "  shell:     ${{ needs.shell.result }}"
            exit 1
          fi
          echo "All jobs succeeded."
